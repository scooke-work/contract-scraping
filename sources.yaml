  # ---- Real executed B2B contracts from SEC EDGAR ----------------------
  # Public-company filings include real material contracts (exhibit 10):
  # MSAs, supply, reseller, licensing, and distribution agreements. This
  # source queries EDGAR full-text search and pulls the actual documents,
  # giving the knowledge base authentic clause language (not just theory).
  #
  # NOTE: SEC asks automated clients to send a descriptive User-Agent with
  # a real contact email — set config.edgar_user_agent at the top of this
  # file before running this source heavily.
  - name: "SEC EDGAR Contracts"
    category: "real-agreements"
    type: edgar
    max_pages: 24            # total agreements to collect across all queries (bump to sample more)
    per_query: 3             # cap per query (keeps variety across the taxonomy below)
    exhibit_types:           # keep only real contract exhibits, not filing bodies that
      - "EX-10"              # mention the phrase. EX-10 = "Material Contracts".
    # Optional date window (EDGAR full-text search covers 2001-present):
    # start_date: "2018-01-01"
    # end_date:   "2025-12-31"
    forms:                   # filings that carry material contracts
      - "8-K"
      - "10-K"
      - "10-Q"
      - "S-1"
    queries:                 # B2B contract taxonomy — each is a full-text phrase search
      - "master services agreement"
      - "master supply agreement"
      - "manufacturing and supply agreement"
      - "reseller agreement"
      - "value added reseller agreement"
      - "distribution agreement"
      - "software license agreement"
      - "end user license agreement"
      - "software as a service agreement"
      - "subscription agreement"
      - "statement of work"
      - "master purchase agreement"
      - "professional services agreement"
      - "consulting agreement"
      - "joint development agreement"
      - "original equipment manufacturer agreement"
      - "strategic alliance agreement"
      - "licensing agreement"
